# nginx.conf — AI TO AI HOLDING: HTTPS Reverse Proxy
# [FIX-1] บังคับ HTTPS — HTTP ทุก request redirect ไป HTTPS อัตโนมัติ
#
# วิธีใช้:
#   1. ติดตั้ง nginx:   sudo apt install nginx
#   2. ติดตั้ง certbot: sudo apt install certbot python3-certbot-nginx
#   3. ขอ SSL cert:     sudo certbot --nginx -d yourdomain.com
#   4. copy ไฟล์นี้ไป:  /etc/nginx/sites-available/ai-to-ai-holding
#   5. enable:          sudo ln -s /etc/nginx/sites-available/ai-to-ai-holding /etc/nginx/sites-enabled/
#   6. reload:          sudo nginx -s reload
#
# FastAPI รันที่ 127.0.0.1:8000 (localhost เท่านั้น — ไม่ expose port ตรง)
# nginx รับ HTTPS 443 จาก internet แล้ว forward ให้ FastAPI

# ── HTTP → HTTPS Redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP ทั้งหมดไป HTTPS (301 permanent)
    return 301 https://$host$request_uri;
}

# ── HTTPS Server ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL Certificate (certbot จัดการ หรือใส่ path เอง)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern SSL configuration (Mozilla SSL Config Generator — Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — บังคับ HTTPS ใน browser นาน 1 ปี (uncommment หลัง test แล้ว)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security Headers
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none';" always;

    # ── Rate Limiting (nginx layer — ก่อนถึง FastAPI) ──────────────────────
    # ป้องกัน DDoS ขั้นแรก
    # สร้าง zone ใน http block: limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    # limit_req zone=api burst=20 nodelay;

    # ── Chairman Endpoints — เพิ่มจำกัด IP ที่ nginx layer ──────────────────
    # uncommment และแก้ IP ให้ถูกต้อง:
    # location /v1/chairman/ {
    #     allow 127.0.0.1;
    #     allow YOUR.CHAIRMAN.IP.HERE;
    #     deny all;
    #
    #     proxy_pass http://127.0.0.1:8000;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ── Main Proxy ────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # ซ่อน server version
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ซ่อน nginx version
    server_tokens off;

    # Block การเข้าถึงไฟล์ที่ไม่ควร expose
    location ~ /\.(env|db|sqlite|git) {
        deny all;
        return 404;
    }
}
